<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive ImageMap</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Interactive Imagemap</h1>
            <p>Click on different areas to learn more</p>
            <a href="editor.html" class="editor-link">⚙️ Edit Settings</a>
        </header>

        <main>
            <div class="imagemap-wrapper">
                <svg 
                    id="imagemapSVG"
                    width="800" 
                    height="600" 
                    viewBox="0 0 800 600"
                    xmlns="http://www.w3.org/2000/svg"
                    class="responsive-svg"
                >
                    <!-- Background -->
                    <rect width="800" height="600" fill="#f0f0f0"/>
                    
                    <!-- Circle icons will be generated dynamically from XML -->
                    <g id="circlesContainer"></g>
                </svg>
                
                <map name="imageMap" id="imageMap">
                    <!-- Areas will be generated dynamically from XML -->
                </map>
            </div>

            <div class="images-gallery">
                <img id="galleryImage" src="" alt="Selected item image" class="gallery-image">
            </div>

            <aside class="info-area">
                <div class="info-content">
                    <h2 id="infoTitle">Select an area to learn more</h2>
                    <p id="infoText">Click on any colored section in the map above to see detailed information.</p>
                </div>
            </aside>
        </main>

        <footer>
            <p>&copy; 2026 Pete Ritter. Responsive and accessible.</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
